name: build
on: [push, pull_request]
env:
  PY_COLORS: "1"
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.x']
    steps:
      - uses: actions/checkout@v3
      - name: Set up PDM
        uses: pdm-project/setup-pdm@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pdm sync --dev
      - name: Run tests
        run: pdm run -v pytest autobean_format --cov autobean_format --cov-report xml
      - name: Run type checks
        run: pdm run -v mypy autobean_format
      - name: Upload coverage
        if: matrix.python-version == '3.x'
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: coverage.xml
          add-prefix: autobean_format

  build-nix-flake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Nix
        uses: cachix/install-nix-action@v30
      - name: Build from Nix flake
        run: nix build
      - name: Test run of result
        run: ./result/bin/autobean-format --help
